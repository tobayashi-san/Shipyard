services:
  shipyard:
    build: .
    ports:
      - "3001:3001"
      # HTTPS: replace the port mapping above with:
      # - "443:443"
    volumes:
      - shipyard-data:/app/server/data
      # HTTPS: mount your certificate files (paths on the host):
      # - /etc/ssl/certs/shipyard.crt:/certs/shipyard.crt:ro
      # - /etc/ssl/private/shipyard.key:/certs/shipyard.key:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    environment:
      - NODE_ENV=production
      # - PORT=3001
      # - JWT_SECRET=change-me-in-production
      # - ALLOWED_ORIGINS=https://yourdomain.com
      #
      # ── Native HTTPS ────────────────────────────────────────────
      # Set both to enable HTTPS (port defaults to 443 automatically):
      # - SSL_CERT=/certs/shipyard.crt
      # - SSL_KEY=/certs/shipyard.key

volumes:
  shipyard-data:
