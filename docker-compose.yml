services:
  shipyard:
    build: .
    ports:
      - "443:443"
    volumes:
      - shipyard-data:/app/server/data
      - shipyard-playbooks:/app/server/playbooks
      - shipyard-plugins:/app/plugins
      - shipyard-tofu:/workspaces   # OpenTofu workspaces — override in docker-compose.override.yml to use a host bind mount
      # To use your own certificate instead of the auto-generated one:
      # - /etc/ssl/certs/shipyard.crt:/certs/shipyard.crt:ro
      # - /etc/ssl/private/shipyard.key:/certs/shipyard.key:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('https').get({hostname:'localhost',path:'/api/health',rejectUnauthorized:false}, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    environment:
      - NODE_ENV=production
      # - PORT=443
      # - JWT_SECRET=change-me-in-production
      # - ALLOWED_ORIGINS=https://yourdomain.com
      #
      # Encrypt SSH private keys at rest — set in docker-compose.override.yml
      # - SHIPYARD_KEY_SECRET=
      #
      # To use your own certificate instead of the auto-generated one:
      # - SSL_CERT=/certs/shipyard.crt
      # - SSL_KEY=/certs/shipyard.key

volumes:
  shipyard-data:
  shipyard-playbooks:
  shipyard-plugins:
  shipyard-tofu:
