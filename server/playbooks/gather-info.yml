---
- name: Gather System Information
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Get disk usage
      shell: "df -BG / | awk 'NR==2{printf \"%s %s\", $2, $3}' | sed 's/G//g'"
      register: disk_usage
      changed_when: false

    - name: Get running services
      shell: "systemctl list-units --type=service --state=running --no-pager --no-legend | awk '{print $1}' | sed 's/.service$//' | head -50"
      register: running_services
      changed_when: false

    - name: Get upgradable packages count
      shell: "apt list --upgradable 2>/dev/null | grep -c upgradable || echo 0"
      register: upgradable_count
      changed_when: false
      failed_when: false

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      changed_when: false

    - name: Display system info
      debug:
        msg:
          hostname: "{{ ansible_hostname }}"
          os: "{{ ansible_distribution }} {{ ansible_distribution_version }}"
          kernel: "{{ ansible_kernel }}"
          cpu: "{{ ansible_processor[2] | default('Unknown') }}"
          cpu_cores: "{{ ansible_processor_cores * ansible_processor_count }}"
          ram_total_mb: "{{ ansible_memtotal_mb }}"
          ram_free_mb: "{{ ansible_memfree_mb }}"
          disk: "{{ disk_usage.stdout }}"
          uptime_seconds: "{{ ansible_uptime_seconds }}"
          services: "{{ running_services.stdout_lines }}"
          updates_available: "{{ upgradable_count.stdout | default('0') }}"
          reboot_required: "{{ 'true' if reboot_required_file.stat.exists else 'false' }}"
