---
- name: Check Image Updates
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Detect container runtime (docker or podman)
      shell: "command -v docker 2>/dev/null || command -v podman 2>/dev/null"
      register: runtime_bin
      changed_when: false
      failed_when: false

    - name: Collect all unique container images and check for updates in parallel
      shell: |
        RUNTIME="{{ runtime_bin.stdout }}"

        # Collect images from rootful containers
        resolve_image() {
          local name="$1" img tagged
          img=$($RUNTIME inspect "$name" --format '{% raw %}{{.Config.Image}}{% endraw %}' 2>/dev/null || echo "")
          if echo "$img" | grep -qP '^[a-f0-9]{12}$|^sha256:[a-f0-9]+$'; then
            tagged=$($RUNTIME image inspect "$img" --format '{% raw %}{{range .RepoTags}}{{println .}}{{end}}{% endraw %}' 2>/dev/null | head -1)
            [ -n "$tagged" ] && img="$tagged"
          fi
          echo "${img:-unknown}"
        }

        mapfile -t IMAGES < <(
          $RUNTIME ps -a --format '{% raw %}{{.Names}}{% endraw %}' 2>/dev/null | while read -r name; do
            resolve_image "$name"
          done | sort -u
        )

        # Also collect from rootless podman users
        for sock in /run/user/*/podman/podman.sock; do
          [ -e "$sock" ] || continue
          UID_VAL=$(echo "$sock" | grep -oP '/run/user/\K[0-9]+')
          USERNAME=$(getent passwd "$UID_VAL" | cut -d: -f1 2>/dev/null)
          [ -z "$USERNAME" ] && continue
          while read -r name; do
            img=$(XDG_RUNTIME_DIR=/run/user/$UID_VAL runuser -u "$USERNAME" -- \
              podman inspect "$name" --format '{% raw %}{{.Config.Image}}{% endraw %}' 2>/dev/null || echo "")
            if echo "$img" | grep -qP '^[a-f0-9]{12}$|^sha256:[a-f0-9]+$'; then
              tagged=$(XDG_RUNTIME_DIR=/run/user/$UID_VAL runuser -u "$USERNAME" -- \
                podman image inspect "$img" --format '{% raw %}{{range .RepoTags}}{{println .}}{{end}}{% endraw %}' 2>/dev/null | head -1)
              [ -n "$tagged" ] && img="$tagged"
            fi
            [ -n "$img" ] && echo "$img"
          done < <(XDG_RUNTIME_DIR=/run/user/$UID_VAL runuser -u "$USERNAME" -- \
            podman ps -a --format '{% raw %}{{.Names}}{% endraw %}' 2>/dev/null)
        done | sort -u >> /tmp/_shipyard_extra_images_$$ 2>/dev/null || true

        if [ -f /tmp/_shipyard_extra_images_$$ ]; then
          mapfile -t EXTRA < /tmp/_shipyard_extra_images_$$
          rm -f /tmp/_shipyard_extra_images_$$
          IMAGES=("${IMAGES[@]}" "${EXTRA[@]}")
        fi

        # Registry API check function (no pull, no skopeo needed)
        check_image() {
          local IMAGE="$1"
          [[ "$IMAGE" != *:* ]] && IMAGE="${IMAGE}:latest"
          local TAG="${IMAGE##*:}"
          local IMAGE_NOTAG="${IMAGE%:*}"
          local REGISTRY REPO

          local FIRST=$(echo "$IMAGE_NOTAG" | cut -d/ -f1)
          if echo "$FIRST" | grep -qP '\.|:'; then
            # Normalize docker.io → registry-1.docker.io
            if [ "$FIRST" = "docker.io" ]; then
              REGISTRY="registry-1.docker.io"
              local REST
              REST=$(echo "$IMAGE_NOTAG" | cut -d/ -f2-)
              # docker.io/ubuntu → library/ubuntu, docker.io/fosrl/pangolin → fosrl/pangolin
              if echo "$REST" | grep -q '/'; then
                REPO="$REST"
              else
                REPO="library/$REST"
              fi
            else
              REGISTRY="$FIRST"
              REPO=$(echo "$IMAGE_NOTAG" | cut -d/ -f2-)
            fi
          elif echo "$IMAGE_NOTAG" | grep -q '/'; then
            REGISTRY="registry-1.docker.io"
            REPO="$IMAGE_NOTAG"
          else
            REGISTRY="registry-1.docker.io"
            REPO="library/$IMAGE_NOTAG"
          fi

          local ACCEPT='-H "Accept: application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json"'
          local URL="https://${REGISTRY}/v2/${REPO}/manifests/${TAG}"
          local REMOTE="" TOKEN=""

          extract_digest() {
            grep -i -E '(docker-content-digest|oci-content-digest):' | awk '{print $2}' | tr -d '\r\n'
          }

          if [ "$REGISTRY" = "registry-1.docker.io" ]; then
            TOKEN=$(curl -sf --connect-timeout 5 --max-time 10 \
              "https://auth.docker.io/token?service=registry.docker.io&scope=repository:${REPO}:pull" \
              | grep -oP '"token"\s*:\s*"\K[^"]+' || echo "")
            [ -z "$TOKEN" ] && echo "${IMAGE}|unknown" && return
            REMOTE=$(curl -sf --connect-timeout 5 --max-time 10 \
              -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json" \
              -D - -o /dev/null \
              "$URL" | extract_digest)
          else
            local RESP
            RESP=$(curl -sf --connect-timeout 5 --max-time 10 \
              -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json" \
              -D - -o /dev/null \
              "$URL" 2>/dev/null)
            REMOTE=$(echo "$RESP" | extract_digest)
            if [ -z "$REMOTE" ]; then
              local WWW REALM SERVICE SCOPE
              WWW=$(echo "$RESP" | grep -i 'www-authenticate:')
              REALM=$(echo "$WWW" | grep -oP 'realm="\K[^"]+')
              [ -z "$REALM" ] && echo "${IMAGE}|unknown" && return
              SERVICE=$(echo "$WWW" | grep -oP 'service="\K[^"]+')
              SCOPE=$(echo "$WWW" | grep -oP 'scope="\K[^"]+')
              TOKEN=$(curl -sf --connect-timeout 5 --max-time 10 \
                "${REALM}?service=${SERVICE}&scope=${SCOPE}" \
                | grep -oP '"token"\s*:\s*"\K[^"]+' || \
                  curl -sf --connect-timeout 5 --max-time 10 \
                "${REALM}?service=${SERVICE}&scope=${SCOPE}" \
                | grep -oP '"access_token"\s*:\s*"\K[^"]+' || echo "")
              [ -z "$TOKEN" ] && echo "${IMAGE}|unknown" && return
              REMOTE=$(curl -sf --connect-timeout 5 --max-time 10 \
                -H "Authorization: Bearer $TOKEN" \
                -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json, application/vnd.docker.distribution.manifest.v2+json, application/vnd.oci.image.index.v1+json, application/vnd.oci.image.manifest.v1+json" \
                -D - -o /dev/null \
                "$URL" | extract_digest)
            fi
          fi

          local LOCAL
          LOCAL=$($RUNTIME image inspect "$IMAGE" \
            --format '{% raw %}{{range .RepoDigests}}{{println .}}{{end}}{% endraw %}' 2>/dev/null \
            | grep -oP '(?<=@)sha256:[a-f0-9]+' | head -1 || echo "")

          [ -z "$LOCAL" ] && LOCAL="none"
          [ -z "$REMOTE" ] && REMOTE="unknown"

          if   [ "$LOCAL" = "none" ];     then echo "${IMAGE}|unknown"
          elif [ "$REMOTE" = "unknown" ]; then echo "${IMAGE}|unknown"
          elif [ "$LOCAL" = "$REMOTE" ];  then echo "${IMAGE}|up_to_date"
          else                                 echo "${IMAGE}|update_available"
          fi
        }

        # Run all checks in parallel
        TMPDIR_RESULTS=$(mktemp -d)
        for IMAGE in "${IMAGES[@]}"; do
          [ -z "$IMAGE" ] && continue
          (check_image "$IMAGE" > "$TMPDIR_RESULTS/$(echo "$IMAGE" | tr '/:' '__')") &
        done
        wait
        cat "$TMPDIR_RESULTS"/* 2>/dev/null | sort
        rm -rf "$TMPDIR_RESULTS"
      args:
        executable: /bin/bash
      register: update_results
      changed_when: false
      failed_when: false
      when: runtime_bin.rc == 0

    - name: Display update results
      debug:
        msg: "{{ update_results.stdout_lines | default([]) }}"
