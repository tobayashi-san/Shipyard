---
- name: Gather Containers
  hosts: all
  become: yes
  gather_facts: no
  tasks:
    - name: Detect container runtime (docker or podman)
      shell: "command -v docker 2>/dev/null || command -v podman 2>/dev/null"
      register: runtime_bin
      changed_when: false
      failed_when: false

    - name: Get all containers
      shell: "{{ runtime_bin.stdout }} ps -a --format '{% raw %}{{.Names}}|{{.Image}}|{{.State}}|{{.Status}}|{{.CreatedAt}}|{{.Label \"com.docker.compose.project\"}}|{{.Label \"com.docker.compose.project.working_dir\"}}{% endraw %}'"
      register: container_ps
      when: runtime_bin.rc == 0 and runtime_bin.stdout != ''
      changed_when: false

    - name: Display container info
      debug:
        msg: "{{ container_ps.stdout_lines if container_ps.stdout_lines is defined else [] }}"
