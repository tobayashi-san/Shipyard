# category: Security
---
- name: Firewall Setup (UFW)
  hosts: all
  become: true
  vars:
    allowed_tcp_ports:
      - 22
      - 80
      - 443
    enable_ufw: true
  tasks:
    - name: Install UFW
      apt:
        name: ufw
        state: present
        update_cache: true
      when: ansible_os_family == "Debian"
    - name: Reset UFW
      ufw:
        state: reset
    - name: Default deny incoming
      ufw:
        default: deny
        direction: incoming
    - name: Default allow outgoing
      ufw:
        default: allow
        direction: outgoing
    - name: Allow configured ports
      ufw:
        rule: allow
        port: "{{ item | string }}"
        proto: tcp
      loop: "{{ allowed_tcp_ports }}"
    - name: Enable UFW
      ufw:
        state: enabled
      when: enable_ufw
    - name: Final UFW status
      command: ufw status verbose
      register: ufw_final
      changed_when: false
    - name: Print status
      debug:
        msg: "{{ ufw_final.stdout_lines }}"
