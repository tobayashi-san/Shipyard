# category: Network
---
- name: Switch to DHCP (Netplan)
  hosts: all
  become: true
  vars:
    network_interface: "eth0"
  tasks:
    - name: Only run on Debian/Ubuntu with Netplan
      meta: end_host
      when: ansible_os_family != "Debian"
    - name: Backup and remove old static Netplan config
      shell: |
        for f in /etc/netplan/*.yaml /etc/netplan/*.yml; do
          [ -f "$f" ] && mv "$f" "$f.bak.$(date +%Y%m%d%H%M%S)";
        done
      ignore_errors: true
      changed_when: false
    - name: Write DHCP Netplan config
      copy:
        dest: /etc/netplan/99-dhcp.yaml
        mode: '0600'
        content: |
          network:
            version: 2
            ethernets:
              {{ network_interface }}:
                dhcp4: true
    - name: Apply Netplan
      command: netplan apply
      changed_when: true
    - name: Print result
      debug:
        msg: "✅ {{ network_interface }} switched back to DHCP"
