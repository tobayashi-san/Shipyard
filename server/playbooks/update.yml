---
- name: System Update
  hosts: all
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_facts['os_family'] == "Debian"

    - name: Upgrade all packages (Debian/Ubuntu)
      apt:
        upgrade: full
        autoremove: yes
      when: ansible_facts['os_family'] == "Debian"
      register: apt_result

    - name: Update yum packages (RHEL/CentOS)
      yum:
        name: '*'
        state: latest
      when: ansible_facts['os_family'] == "RedHat"
      register: yum_result

    - name: Display update results (Debian)
      debug:
        msg: "Packages updated successfully"
      when: ansible_facts['os_family'] == "Debian" and apt_result is defined

    - name: Check if reboot is required
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      when: ansible_facts['os_family'] == "Debian"

    - name: Notify if reboot is required
      debug:
        msg: "REBOOT REQUIRED on {{ inventory_hostname }}"
      when: ansible_facts['os_family'] == "Debian" and reboot_required.stat.exists is defined and reboot_required.stat.exists
