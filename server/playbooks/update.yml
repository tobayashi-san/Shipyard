---
- name: System Update
  hosts: all
  become: yes
  gather_facts: yes
  tasks:
    - name: Update apt cache (Debian/Ubuntu)
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"

    - name: Upgrade all packages (Debian/Ubuntu)
      apt:
        upgrade: full
        autoremove: yes
      when: ansible_os_family == "Debian"
      register: apt_result

    - name: Upgrade all packages (RHEL/Fedora)
      dnf:
        name: '*'
        state: latest
        update_cache: yes
      when: ansible_os_family == "RedHat"
      register: dnf_result

    - name: Upgrade all packages (Arch Linux)
      pacman:
        update_cache: yes
        upgrade: yes
      when: ansible_os_family == "Archlinux"
      register: pacman_result

    - name: Upgrade all packages (openSUSE)
      zypper:
        name: '*'
        state: latest
        update_cache: yes
      when: ansible_os_family == "Suse"
      register: zypper_result

    - name: Check if reboot is required (Debian/Ubuntu)
      stat:
        path: /var/run/reboot-required
      register: reboot_file
      when: ansible_os_family == "Debian"

    - name: Check if reboot is required (RHEL/Fedora)
      command: needs-restarting -r
      register: reboot_rhel
      changed_when: false
      failed_when: false
      when: ansible_os_family == "RedHat"

    - name: Notify if reboot is required
      debug:
        msg: "REBOOT REQUIRED on {{ inventory_hostname }}"
      when: >
        (ansible_os_family == "Debian" and reboot_file.stat.exists | default(false))
        or (ansible_os_family == "RedHat" and (reboot_rhel.rc | default(0)) == 1)
