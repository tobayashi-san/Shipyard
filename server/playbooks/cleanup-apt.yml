---
- name: Cleanup APT Cache
  hosts: all
  become: true

  tasks:
    - name: Skip non-Debian/Ubuntu systems
      meta: end_host
      when: ansible_os_family != "Debian"

    - name: Get disk usage before
      command: df -h /
      register: before
      changed_when: false

    - name: Remove unused packages
      apt:
        autoremove: true
        purge: true

    - name: Clean APT cache
      apt:
        autoclean: true

    - name: Clear downloaded package files
      command: apt-get clean
      changed_when: false

    - name: Get disk usage after
      command: df -h /
      register: after
      changed_when: false

    - name: Show result
      debug:
        msg:
          - "Before: {{ before.stdout_lines[1] }}"
          - "After:  {{ after.stdout_lines[1] }}"
