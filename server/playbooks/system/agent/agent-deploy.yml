---
# ─────────────────────────────────────────────────────────
# Shipyard Agent – Deployment Playbook
#
# Installiert und konfiguriert den Runner-Agent auf
# managed Servern. Erkennt automatisch ob Push oder
# Pull-Modus passend ist und konfiguriert entsprechend.
#
# Verwendung aus Shipyard heraus:
#   Wird automatisch ausgeführt wenn im UI
#   "Agent aktivieren" geklickt wird.
#
# Manuelle Verwendung:
#   ansible-playbook agent-deploy.yml \
#     -i inventory.yml \
#     -e "shipyard_url=https://shipyard.example.com" \
#     -e "agent_token=<token>"
#
# Variablen (über Shipyard oder -e gesetzt):
#   shipyard_url    – URL der Shipyard-Instanz
#   agent_token     – Authentifizierungs-Token für diesen Server
#   agent_mode      – push / pull / auto (default: auto)
#   agent_interval  – Polling-Intervall in Sekunden (default: 30)
# ─────────────────────────────────────────────────────────

- name: Shipyard Agent deployment
  hosts: all
  become: true
  gather_facts: true

  vars:
    agent_mode: "auto"
    agent_interval: 30
    agent_version: "3.0.0"
    agent_user: "shipyard-agent"
    agent_group: "shipyard-agent"
    install_dir: "/usr/local/bin"
    config_dir: "/etc/shipyard"
    data_dir: "/var/lib/shipyard-agent"
    runner_script: "shipyard-runner"

  # ── Preflight ──────────────────────────────────────────

  pre_tasks:

    - name: Prüfe ob Shipyard-URL gesetzt ist
      ansible.builtin.assert:
        that:
          - shipyard_url is defined
          - shipyard_url | length > 0
        fail_msg: "shipyard_url muss gesetzt sein"

    - name: Prüfe ob Agent-Token gesetzt ist
      ansible.builtin.assert:
        that:
          - agent_token is defined
          - agent_token | length > 0
        fail_msg: "agent_token muss gesetzt sein"

    - name: Prüfe HTTPS-URL für Push/Auto
      ansible.builtin.assert:
        that:
          - shipyard_url is match('^https://')
        fail_msg: "shipyard_url muss mit https:// beginnen"
      when: agent_mode in ['push', 'auto']

    - name: Schreibe optionales Shipyard-CA-Zertifikat für TLS-Prüfung
      ansible.builtin.copy:
        content: "{{ shipyard_ca_cert_pem }}"
        dest: /tmp/shipyard-agent-ca.crt
        owner: root
        group: root
        mode: "0644"
      when: (shipyard_ca_cert_pem | default('') | length) > 0

  tasks:

    # ── Modus-Erkennung ──────────────────────────────────

    - name: Teste Erreichbarkeit von Shipyard (für Auto-Modus)
      ansible.builtin.uri:
        url: "{{ shipyard_url }}/api/health"
        method: GET
        timeout: 5
        status_code: [200, 401, 403]
        validate_certs: true
        ca_path: "{{ ((shipyard_ca_cert_pem | default('') | length) > 0) | ternary('/tmp/shipyard-agent-ca.crt', omit) }}"
      register: shipyard_reachable
      ignore_errors: true
      when: agent_mode == "auto"

    - name: Bestimme effektiven Modus
      ansible.builtin.set_fact:
        effective_mode: >-
          {%- if agent_mode != 'auto' -%}
            {{ agent_mode }}
          {%- elif shipyard_reachable is succeeded -%}
            push
          {%- else -%}
            pull
          {%- endif -%}

    - name: Zeige gewählten Modus
      ansible.builtin.debug:
        msg: "Agent-Modus: {{ effective_mode | trim }} (angefragt: {{ agent_mode }})"

    # ── System-User anlegen ──────────────────────────────

    - name: Agent-Gruppe erstellen
      ansible.builtin.group:
        name: "{{ agent_group }}"
        system: true
        state: present

    - name: Agent-User erstellen
      ansible.builtin.user:
        name: "{{ agent_user }}"
        group: "{{ agent_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ data_dir }}"
        create_home: false
        comment: "Shipyard Metrics Agent"

    - name: User zur Docker-Gruppe hinzufügen (wenn Docker vorhanden)
      ansible.builtin.user:
        name: "{{ agent_user }}"
        groups: docker
        append: true
      when: ansible_facts.packages is defined and 'docker-ce' in ansible_facts.packages
      ignore_errors: true

    # ── Verzeichnisse ────────────────────────────────────

    - name: Konfigurationsverzeichnis erstellen
      ansible.builtin.file:
        path: "{{ config_dir }}"
        state: directory
        owner: root
        group: "{{ agent_group }}"
        mode: "0750"

    - name: Datenverzeichnis erstellen
      ansible.builtin.file:
        path: "{{ data_dir }}"
        state: directory
        owner: "{{ agent_user }}"
        group: "{{ agent_group }}"
        mode: "0700"

    # ── Runner-Script deployen ───────────────────────────

    - name: Runner-Script kopieren
      ansible.builtin.copy:
        src: files/shipyard-runner.sh
        dest: "{{ install_dir }}/{{ runner_script }}"
        owner: root
        group: root
        mode: "0755"
      notify: Restart shipyard-agent

    # ── Konfiguration ────────────────────────────────────

    - name: Setze optionalen Shipyard-CA-Pfad für Runner
      ansible.builtin.set_fact:
        shipyard_ca_cert_path: "{{ config_dir }}/shipyard-ca.crt"
      when: (shipyard_ca_cert_pem | default('') | length) > 0

    - name: Environment-Datei schreiben
      ansible.builtin.template:
        src: templates/runner.env.j2
        dest: "{{ config_dir }}/runner.env"
        owner: root
        group: "{{ agent_group }}"
        mode: "0640"
      notify: Restart shipyard-agent

    - name: Installiere optionales Shipyard-CA-Zertifikat dauerhaft
      ansible.builtin.copy:
        content: "{{ shipyard_ca_cert_pem }}"
        dest: "{{ config_dir }}/shipyard-ca.crt"
        owner: root
        group: "{{ agent_group }}"
        mode: "0640"
      when: (shipyard_ca_cert_pem | default('') | length) > 0
      notify: Restart shipyard-agent


    # ── Systemd-Unit ─────────────────────────────────────

    - name: Systemd-Service installieren
      ansible.builtin.template:
        src: templates/shipyard-agent.service.j2
        dest: /etc/systemd/system/shipyard-agent.service
        owner: root
        group: root
        mode: "0644"
      notify:
        - Reload systemd
        - Restart shipyard-agent

    # ── Erstes Manifest (nur Pull-Modus) ─────────────────

    - name: Initiales Manifest schreiben (Pull-Modus)
      ansible.builtin.copy:
        src: files/default-manifest.json
        dest: "{{ data_dir }}/manifest.json"
        owner: "{{ agent_user }}"
        group: "{{ agent_group }}"
        mode: "0640"
      when: effective_mode | trim == "pull"

    # ── Service starten ──────────────────────────────────

    - name: Systemd daemon-reload
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Agent-Service aktivieren und starten
      ansible.builtin.systemd:
        name: shipyard-agent
        enabled: true
        state: started

    # ── Verifizierung ────────────────────────────────────

    - name: Warte kurz auf ersten Lauf
      ansible.builtin.pause:
        seconds: 5

    - name: Prüfe ob Agent läuft
      ansible.builtin.systemd:
        name: shipyard-agent
      register: agent_status

    - name: Agent-Status anzeigen
      ansible.builtin.debug:
        msg: >-
          Agent {{ agent_version }} installiert.
          Modus: {{ effective_mode | trim }}.
          Status: {{ agent_status.status.ActiveState }}.
          User: {{ agent_user }}.

    - name: Warnung wenn Agent nicht läuft
      ansible.builtin.fail:
        msg: >-
          Agent wurde installiert, läuft aber nicht!
          Prüfe: journalctl -u shipyard-agent -n 20
      when: agent_status.status.ActiveState != "active"
      ignore_errors: true

  # ── Handlers ─────────────────────────────────────────

  handlers:

    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart shipyard-agent
      ansible.builtin.systemd:
        name: shipyard-agent
        state: restarted
      when: agent_status is not defined or agent_status.status.ActiveState == "active"
