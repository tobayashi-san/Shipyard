<!DOCTYPE html>
<html lang="en" data-theme="auto">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Shipyard – Modernes Dashboard für Linux Server Management">
  <title>Shipyard</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div id="app">
    <!-- Mobile Hamburger Menu Button -->
    <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open navigation" aria-controls="sidebar" aria-expanded="false">
      <i class="fas fa-bars"></i>
    </button>
    <div id="mobile-overlay" class="mobile-overlay hidden"></div>

    <aside id="sidebar" class="sidebar"></aside>
    <main id="main-content" class="main-content">
      <div class="page-content" style="padding:32px;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:16px;margin-bottom:24px;">
          <div class="panel" style="height:86px;"><div class="skeleton" style="width:100%;height:100%;"></div></div>
          <div class="panel" style="height:86px;"><div class="skeleton" style="width:100%;height:100%;"></div></div>
          <div class="panel" style="height:86px;"><div class="skeleton" style="width:100%;height:100%;"></div></div>
          <div class="panel" style="height:86px;"><div class="skeleton" style="width:100%;height:100%;"></div></div>
        </div>
        <div class="panel" style="padding:24px;">
          <div class="skeleton-text" style="width:180px;height:20px;margin-bottom:24px;"></div>
          <div class="skeleton-text" style="margin-bottom:12px;"></div>
          <div class="skeleton-text" style="width:85%;margin-bottom:12px;"></div>
          <div class="skeleton-text" style="width:90%;margin-bottom:12px;"></div>
          <div class="skeleton-text" style="width:70%;"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modals container -->
  <div id="modal-overlay" class="modal-overlay hidden"></div>

  <!-- Compose Modal -->
  <div id="compose-modal-overlay" class="modal-overlay hidden">
    <div id="compose-modal" class="modal" style="max-width:720px;display:flex;flex-direction:column;max-height:90vh;">
      <h2 id="compose-modal-title" style="justify-content:space-between;flex-shrink:0;">
        <span><i class="fas fa-edit"></i> Edit Compose Stack</span>
        <button id="close-compose-modal" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-muted);line-height:1;padding:0 2px;" title="Close">&times;</button>
      </h2>
      <form id="compose-form" style="display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;">
        <div class="form-body" style="flex-shrink:0;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">Path on server</label>
            <input class="form-input" type="text" id="compose-path" required style="font-family:var(--font-mono);font-size:13px;">
          </div>
        </div>

        <div style="padding:0 20px;flex:1;min-height:0;display:flex;flex-direction:column;gap:6px;">
          <label class="form-label" style="flex-shrink:0;">docker-compose.yml</label>
          <div id="compose-loading" style="display:none;padding:32px;text-align:center;color:var(--text-muted);">
            <div class="loader" style="margin:0 auto 10px;"></div>
            Loading configuration from server…
          </div>
          <textarea id="compose-editor" required spellcheck="false"
            style="flex:1;min-height:360px;resize:none;font-family:var(--font-mono);font-size:12.5px;line-height:1.6;
                   background:#0d1117;color:#c9d1d9;border:1px solid var(--border-section);
                   border-radius:var(--radius);padding:14px;outline:none;
                   transition:border-color 120ms;"></textarea>
        </div>

        <div class="form-actions" style="flex-shrink:0;">
          <button type="button" class="btn btn-secondary" id="cancel-compose-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-compose-btn">
            <i class="fas fa-save"></i> Save & Apply
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Global Floating Terminal Drawer -->
  <div id="global-terminal" class="global-terminal" style="display: none;">
    <!-- Resize handle -->
    <div id="global-terminal-resize" class="gt-resize-handle">
      <div class="gt-resize-bar"></div>
    </div>
    <div class="gt-header">
      <span id="global-terminal-title" class="gt-title"></span>
      <div class="gt-actions">
        <button id="global-terminal-toggle" class="gt-btn" title="Minimize/Maximize">▼</button>
        <button id="global-terminal-close" class="gt-btn close" title="Close">×</button>
      </div>
    </div>
    <div id="global-terminal-body" class="gt-body"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
